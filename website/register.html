<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — FTservice</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <div class="logo__mark">FT</div>
        <div class="logo__text">FT<span>service</span></div>
      </a>
      <nav class="nav">
        <a href="parts.html">Запчасти</a>
        <a href="masters.html">Мастера</a>
        <a href="cabinet.html">Личный кабинет</a>
        <a href="help.html">Помощь</a>
      </nav>
      <div class="header__actions"></div>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Регистрация</h1>
      <p class="auth-card__subtitle">Выберите тип аккаунта</p>
      <div id="auth-error" class="auth-error"></div>
      <form id="register-form" class="auth-form">
        <div class="form-row">
          <label for="reg-role">Тип аккаунта</label>
          <select id="reg-role" name="role" required>
            <option value="buyer">Покупатель</option>
            <option value="seller">Продавец запчастей</option>
            <option value="master">Мастер (автоэлектрик)</option>
          </select>
        </div>
        <div class="form-row">
          <label for="full_name">Имя</label>
          <input type="text" id="full_name" name="full_name" required minlength="2" placeholder="Асан А.">
        </div>
        <div class="form-row">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-row">
          <label for="phone">Телефон</label>
          <input type="tel" id="phone" name="phone" placeholder="+996 555 123 456">
        </div>
        <div>
          <div class="form-row">
            <label for="district">Район работы</label>
            <input type="text" id="district" name="district" placeholder="Джал, Асанбай…">
          </div>
          <div class="form-row">
            <label for="spec">Специализация</label>
            <input type="text" id="spec" name="spec" value="Автоэлектрик">
          </div>
          <p class="auth-hint">Профиль мастера появится в каталоге после проверки модератором.</p>
        </div>
        <div class="form-row">
          <label for="password">Пароль</label>
          <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-row">
          <label for="password2">Повтор пароля</label>
          <input type="password" id="password2" name="password2" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn--primary btn--full">Зарегистрироваться</button>
      </form>
      <p class="auth-footer">Уже есть аккаунт? <a href="login.html">Войти</a></p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth-ui.js"></script>
</body>
</html>
