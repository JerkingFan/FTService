services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-docker-secret-change-me}
      DATABASE_URL: sqlite:////data/ftservice.db
      CORS_ORIGINS: "*"
      WHATSAPP_PHONE: ${WHATSAPP_PHONE:-996700000000}
      TELEGRAM_USERNAME: ${TELEGRAM_USERNAME:-ftservice_kg}
      UPLOAD_DIR: /app/uploads
    volumes:
      - ftservice_data:/data
      - ftservice_uploads:/app/uploads
    working_dir: /app
    command: >
      sh -c "cd /app && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  ftservice_data:
  ftservice_uploads:
